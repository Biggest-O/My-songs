<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big O</title>

<style>

body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  padding-bottom:170px;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

header{
  height:50vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:2;
}

#logo{
  font-size:6rem;
  font-weight:900;
  letter-spacing:12px;
  color:white;
  text-shadow:0 0 25px cyan;
  transition:transform 0.08s linear;
}

main{
  max-width:800px;
  margin:auto;
  padding:1rem;
  position:relative;
  z-index:2;
}

.track{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:1rem;
  border-radius:16px;
  margin-bottom:1rem;
  backdrop-filter:blur(10px);
}

.track-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.song-title{
  font-size:1.1rem;
  font-weight:bold;
}

.play-btn{
  background:#00ffff;
  border:none;
  color:black;
  padding:.6rem 1rem;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.vote-row{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.vote-btn{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  color:white;
  padding:.5rem .9rem;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.vote-btn:hover{
  transform:scale(1.05);
  background:rgba(255,255,255,0.15);
}

.footer-player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#050505;
  border-top:2px solid cyan;
  padding:1rem;
  z-index:5;
}

#nowPlaying{
  text-align:center;
  color:cyan;
  margin-bottom:1rem;
  letter-spacing:2px;
  font-weight:bold;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.control-btn{
  background:black;
  border:1px solid cyan;
  color:cyan;
  padding:.7rem 1.2rem;
  border-radius:50px;
  cursor:pointer;
  transition:0.2s;
}

.control-btn:hover{
  background:cyan;
  color:black;
}

</style>
</head>

<body>

<canvas id="viz"></canvas>

<header>
  <h1 id="logo">BIG O</h1>
</header>

<main id="songList"></main>

<div class="footer-player">

  <div id="nowPlaying">
    PICK A SONG
  </div>

  <div class="controls">

    <button class="control-btn"
    onclick="prevSong()">
      Prev
    </button>

    <button class="control-btn"
    onclick="togglePlay()">
      Play / Pause
    </button>

    <button class="control-btn"
    onclick="nextSong()">
      Next
    </button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* =========================
   SUPABASE
========================= */

const SUPABASE_URL =
"https://gbizrnejfmgjkrxjbisu.supabase.co";

const SUPABASE_KEY =
"sb_publishable_4PRIlOOAZygDex8gj9B8Mw_A9mic2o7";

const sb = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* =========================
   UNIQUE USER ID
========================= */

if(!localStorage.getItem("user_id")){

  localStorage.setItem(
    "user_id",
    crypto.randomUUID()
  );

}

const USER_ID =
localStorage.getItem("user_id");

/* =========================
   SONGS
========================= */

const tracks = [

{
  id:"changed_memories",
  t:"Changed Memories",
  f:"songs/changed-memories.wav"
},

{
  id:"when_i_think_about_you",
  t:"When I Think About You",
  f:"songs/when-i-think-about-you.mp3"
},

{
  id:"ariya",
  t:"Ariya",
  f:"songs/ariya.mp3"
},

{
  id:"nice_like_this",
  t:"Nice Like This",
  f:"songs/nice-like-this.mp3"
},

{
  id:"youre_my_home",
  t:"You're My Home",
  f:"songs/youre-my-home.mp3"
},

{
  id:"feeling_down",
  t:"Feeling Down",
  f:"songs/feeling-down.mp3"
}

];

/* =========================
   AUDIO PLAYER
========================= */

let current = 0;

const audio = new Audio();

function playSong(i){

  current = i;

  audio.src = tracks[i].f;

  audio.play()
  .then(()=>{

    document.getElementById(
      "nowPlaying"
    ).innerText =
    "NOW PLAYING: " + tracks[i].t;

  })
  .catch(()=>{

    alert(
      "Audio failed.\n\nCheck filename:\n\n"
      + tracks[i].f
    );

  });

}

function togglePlay(){

  if(audio.src === ""){

    playSong(current);
    return;

  }

  if(audio.paused){

    audio.play();

  }else{

    audio.pause();

  }

}

function nextSong(){

  current++;

  if(current >= tracks.length){
    current = 0;
  }

  playSong(current);

}

function prevSong(){

  current--;

  if(current < 0){
    current = tracks.length - 1;
  }

  playSong(current);

}

/* =========================
   LOAD SONGS
========================= */

async function loadSongs(){

  let votes = [];

  try{

    const { data } =
    await sb
    .from("Votes")
    .select("*");

    votes = data || [];

  }catch(err){

    console.log(err);

  }

  const container =
  document.getElementById(
    "songList"
  );

  container.innerHTML = "";

  tracks.forEach((song,index)=>{

    const likes =
    votes.filter(v =>
      v.song_id === song.id &&
      v.vote_type === "likes"
    ).length;

    const dislikes =
    votes.filter(v =>
      v.song_id === song.id &&
      v.vote_type === "dislikes"
    ).length;

    const div =
    document.createElement("div");

    div.className = "track";

    div.innerHTML = `

      <div class="track-top">

        <div class="song-title">
          ${song.t}
        </div>

        <button
        class="play-btn"
        onclick="playSong(${index})">

          Play

        </button>

      </div>

      <div class="vote-row">

        <button
        class="vote-btn"
        onclick="vote('${song.id}','likes')">

          👍 ${likes}

        </button>

        <button
        class="vote-btn"
        onclick="vote('${song.id}','dislikes')">

          👎 ${dislikes}

        </button>

      </div>

    `;

    container.appendChild(div);

  });

}

/* =========================
   ONE VOTE PER USER
========================= */

async function vote(songId,type){

  try{

    const { data: existing } =
    await sb
    .from("Votes")
    .select("*")
    .eq("song_id", songId)
    .eq("user_ip", USER_ID)
    .maybeSingle();

    if(existing){

      // already voted same thing
      if(existing.vote_type === type){
        return;
      }

      // switch vote
      await sb
      .from("Votes")
      .update({
        vote_type:type
      })
      .eq("id", existing.id);

    }else{

      // first vote
      await sb
      .from("Votes")
      .insert([{
        song_id:songId,
        user_ip:USER_ID,
        vote_type:type
      }]);

    }

    loadSongs();

  }catch(err){

    console.log(err);

    alert("Vote failed.");

  }

}

/* =========================
   SMOOTH RAIN
========================= */

const canvas =
document.getElementById("viz");

const ctx =
canvas.getContext("2d");

function resize(){

  canvas.width =
  window.innerWidth;

  canvas.height =
  window.innerHeight;

}

resize();

window.addEventListener(
  "resize",
  resize
);

const rain = [];

for(let i=0;i<120;i++){

  rain.push({

    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,
    len:10 + Math.random()*25,
    speed:4 + Math.random()*6

  });

}

let hue = 180;

function animate(){

  requestAnimationFrame(
    animate
  );

  ctx.fillStyle =
  "rgba(0,0,0,0.18)";

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  hue += 0.4;

  const color =
  `hsl(${hue},100%,50%)`;

  ctx.strokeStyle = color;

  ctx.lineWidth = 1.2;

  rain.forEach(r=>{

    ctx.beginPath();

    ctx.moveTo(r.x,r.y);

    ctx.lineTo(r.x,r.y+r.len);

    ctx.stroke();

    r.y += r.speed;

    if(r.y > canvas.height){

      r.y = -20;

      r.x =
      Math.random()*canvas.width;

    }

  });

  const scale =
  audio.paused
  ? 1
  : 1.03 +
    Math.sin(Date.now()*0.005)
    * 0.02;

  const logo =
  document.getElementById(
    "logo"
  );

  logo.style.transform =
  `scale(${scale})`;

  logo.style.textShadow =
  `0 0 25px ${color}`;

}

animate();

/* ========================= */

loadSongs();

</script>

</body>
</html>
